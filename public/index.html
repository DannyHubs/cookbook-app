<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookbook</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 24px;
      color: #1d1d1f;
    }
    h1 { margin-top: 0; }
    .container { max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      margin-bottom: 16px;
    }
    h2 { margin-top: 0; font-size: 18px; }
    label { display: block; font-size: 13px; color: #555; margin: 8px 0 4px; }
    input, textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    textarea { min-height: 70px; resize: vertical; }
    button {
      background: #0071e3;
      color: white;
      border: none;
      padding: 9px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 12px;
    }
    button:hover { background: #0077ed; }
    button.secondary { background: #6e6e73; }
    button.danger { background: #d93025; }
    .recipe-item {
      border: 1px solid #e5e5ea;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background .1s;
    }
    .recipe-item:hover { background: #f0f0f3; }
    .recipe-item.active { border-color: #0071e3; background: #eef5ff; }
    .recipe-name { font-weight: 600; }
    .recipe-meta { font-size: 12px; color: #6e6e73; margin-top: 4px; }
    .ingredient-row {
      display: grid;
      grid-template-columns: 2fr 80px 80px 80px 80px 80px 60px 30px;
      gap: 6px;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f3;
      font-size: 13px;
    }
    .ingredient-row.header {
      font-weight: 600;
      color: #6e6e73;
      font-size: 11px;
      text-transform: uppercase;
    }
    .ingredient-row input, .ingredient-row select { padding: 4px 6px; font-size: 13px; }
    .totals {
      margin-top: 14px;
      padding: 12px;
      background: #f0f7ff;
      border-radius: 6px;
      font-size: 14px;
    }
    .empty { color: #6e6e73; padding: 30px; text-align: center; }
    .error { color: #d93025; margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📖 Cookbook</h1>

    <div class="grid">
      <div>
        <div class="card">
          <h2>New Recipe</h2>
          <label>Name</label>
          <input id="newName" placeholder="e.g. Spaghetti Bolognese" />
          <label>Description</label>
          <input id="newDescription" placeholder="Short description" />
          <label>Category</label>
          <select id="newCategory">
            <option value="breakfast">Breakfast</option>
            <option value="main-course" selected>Main course</option>
            <option value="dessert">Dessert</option>
            <option value="snack">Snack</option>
            <option value="drink">Drink</option>
          </select>
          <label>Servings</label>
          <input id="newServings" type="number" value="4" min="1" />
          <button onclick="createRecipe()">Create recipe</button>
          <div id="newError" class="error"></div>
        </div>

        <div class="card">
          <h2>Recipes</h2>
          <input id="search" placeholder="Search by name..." oninput="loadRecipes()" />
          <div id="recipeList" style="margin-top:12px;"></div>
        </div>
      </div>

      <div>
        <div class="card" id="detailCard">
          <div class="empty">Select a recipe to view details</div>
        </div>
      </div>
    </div>
  </div>

<script>
const API = "";
let currentRecipeId = null;

async function api(path, body) {
  const opts = { method: body ? "POST" : "GET", headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || "Request failed");
  return data;
}

async function createRecipe() {
  const errEl = document.getElementById("newError");
  errEl.textContent = "";
  const dtoIn = {
    name: document.getElementById("newName").value.trim(),
    description: document.getElementById("newDescription").value.trim(),
    category: document.getElementById("newCategory").value,
    servings: parseInt(document.getElementById("newServings").value, 10) || 1
  };
  if (!dtoIn.name) { errEl.textContent = "Name is required."; return; }
  try {
    await api("/recipe/create", dtoIn);
    document.getElementById("newName").value = "";
    document.getElementById("newDescription").value = "";
    loadRecipes();
  } catch (e) { errEl.textContent = e.message; }
}

async function loadRecipes() {
  const q = document.getElementById("search").value;
  const url = q ? `/recipe/list?name=${encodeURIComponent(q)}` : "/recipe/list";
  const data = await api(url);
  const list = document.getElementById("recipeList");
  if (!data.itemList.length) {
    list.innerHTML = '<div class="empty">No recipes yet</div>';
    return;
  }
  list.innerHTML = data.itemList.map(r => `
    <div class="recipe-item ${r.id === currentRecipeId ? "active" : ""}" onclick="selectRecipe('${r.id}')">
      <div class="recipe-name">${escapeHtml(r.name)}</div>
      <div class="recipe-meta">${r.category} · ${r.servings} servings · ${r.totalCalories || 0} kcal</div>
    </div>
  `).join("");
}

async function selectRecipe(id) {
  currentRecipeId = id;
  loadRecipes();
  const recipe = await api(`/recipe/get?id=${id}`);
  renderDetail(recipe);
}

function renderDetail(recipe) {
  const card = document.getElementById("detailCard");
  const ings = recipe.ingredientList || [];
  const totals = ings.reduce((acc, i) => ({
    calories: acc.calories + (i.calories || 0),
    protein:  acc.protein  + (i.protein  || 0),
    carbs:    acc.carbs    + (i.carbs    || 0),
    fat:      acc.fat      + (i.fat      || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  card.innerHTML = `
    <h2>Edit Recipe</h2>
    <label>Name</label>
    <input id="editName" value="${escapeAttr(recipe.name)}" />
    <label>Description</label>
    <input id="editDescription" value="${escapeAttr(recipe.description || "")}" />
    <label>Instructions</label>
    <textarea id="editInstructions">${escapeHtml(recipe.instructions || "")}</textarea>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap:10px;">
      <div><label>Servings</label><input id="editServings" type="number" value="${recipe.servings}" /></div>
      <div><label>Prep (min)</label><input id="editPrep" type="number" value="${recipe.prepTimeMin}" /></div>
      <div><label>Cook (min)</label><input id="editCook" type="number" value="${recipe.cookTimeMin}" /></div>
      <div><label>Category</label>
        <select id="editCategory">
          ${["breakfast","main-course","dessert","snack","drink"].map(c =>
            `<option value="${c}" ${c===recipe.category?"selected":""}>${c}</option>`).join("")}
        </select>
      </div>
    </div>
    <button onclick="saveRecipe('${recipe.id}')">Save changes</button>
    <button class="danger" onclick="deleteRecipe('${recipe.id}')">Delete recipe</button>

    <h2 style="margin-top:24px;">Ingredients</h2>
    <div class="ingredient-row header">
      <div>Name</div><div>Amount</div><div>Unit</div>
      <div>kcal</div><div>Protein</div><div>Carbs</div><div>Fat</div><div></div>
    </div>
    ${ings.map(i => `
      <div class="ingredient-row">
        <input value="${escapeAttr(i.name)}" id="ing-${i.id}-name" />
        <input type="number" value="${i.amount}" id="ing-${i.id}-amount" />
        <select id="ing-${i.id}-unit">
          ${["g","kg","ml","l","pcs","tbsp","tsp","cup"].map(u =>
            `<option value="${u}" ${u===i.unit?"selected":""}>${u}</option>`).join("")}
        </select>
        <input type="number" value="${i.calories}" id="ing-${i.id}-calories" />
        <input type="number" value="${i.protein}" id="ing-${i.id}-protein" />
        <input type="number" value="${i.carbs}" id="ing-${i.id}-carbs" />
        <input type="number" value="${i.fat}" id="ing-${i.id}-fat" />
        <button class="danger" style="margin:0;padding:4px 8px;" onclick="deleteIngredient('${i.id}')">×</button>
      </div>
    `).join("")}
    ${ings.length ? `
      <button class="secondary" onclick="saveAllIngredients('${recipe.id}')">Save ingredient changes</button>
    ` : ""}

    <h2 style="margin-top:24px;">Add ingredient</h2>
    <div class="ingredient-row">
      <input id="addName" placeholder="e.g. Ground beef" />
      <input id="addAmount" type="number" placeholder="500" />
      <select id="addUnit">
        ${["g","kg","ml","l","pcs","tbsp","tsp","cup"].map(u => `<option>${u}</option>`).join("")}
      </select>
      <input id="addCalories" type="number" placeholder="kcal" />
      <input id="addProtein" type="number" placeholder="P" />
      <input id="addCarbs" type="number" placeholder="C" />
      <input id="addFat" type="number" placeholder="F" />
      <button style="margin:0;padding:4px 10px;" onclick="addIngredient('${recipe.id}')">+</button>
    </div>

    <div class="totals">
      <strong>Nutrition totals:</strong>
      ${totals.calories} kcal · Protein ${totals.protein}g · Carbs ${totals.carbs}g · Fat ${totals.fat}g
    </div>
  `;
}

async function saveRecipe(id) {
  await api("/recipe/update", {
    id,
    name: document.getElementById("editName").value,
    description: document.getElementById("editDescription").value,
    instructions: document.getElementById("editInstructions").value,
    servings: parseInt(document.getElementById("editServings").value, 10),
    prepTimeMin: parseInt(document.getElementById("editPrep").value, 10),
    cookTimeMin: parseInt(document.getElementById("editCook").value, 10),
    category: document.getElementById("editCategory").value
  });
  selectRecipe(id);
  loadRecipes();
}

async function deleteRecipe(id) {
  if (!confirm("Delete this recipe and all its ingredients?")) return;
  await api("/recipe/delete", { id });
  currentRecipeId = null;
  document.getElementById("detailCard").innerHTML = '<div class="empty">Select a recipe to view details</div>';
  loadRecipes();
}

async function addIngredient(recipeId) {
  const dtoIn = {
    recipeId,
    name: document.getElementById("addName").value.trim(),
    amount: parseFloat(document.getElementById("addAmount").value) || 0,
    unit: document.getElementById("addUnit").value,
    calories: parseFloat(document.getElementById("addCalories").value) || 0,
    protein: parseFloat(document.getElementById("addProtein").value) || 0,
    carbs: parseFloat(document.getElementById("addCarbs").value) || 0,
    fat: parseFloat(document.getElementById("addFat").value) || 0
  };
  if (!dtoIn.name) return alert("Ingredient name required");
  await api("/ingredient/create", dtoIn);
  selectRecipe(recipeId);
  loadRecipes();
}

async function deleteIngredient(id) {
  await api("/ingredient/delete", { id });
  selectRecipe(currentRecipeId);
  loadRecipes();
}

async function saveAllIngredients(recipeId) {
  const data = await api(`/recipe/get?id=${recipeId}`);
  for (const ing of data.ingredientList) {
    await api("/ingredient/update", {
      id: ing.id,
      name: document.getElementById(`ing-${ing.id}-name`).value,
      amount: parseFloat(document.getElementById(`ing-${ing.id}-amount`).value) || 0,
      unit: document.getElementById(`ing-${ing.id}-unit`).value,
      calories: parseFloat(document.getElementById(`ing-${ing.id}-calories`).value) || 0,
      protein: parseFloat(document.getElementById(`ing-${ing.id}-protein`).value) || 0,
      carbs: parseFloat(document.getElementById(`ing-${ing.id}-carbs`).value) || 0,
      fat: parseFloat(document.getElementById(`ing-${ing.id}-fat`).value) || 0
    });
  }
  selectRecipe(recipeId);
  loadRecipes();
}

function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escapeAttr(s) { return String(s).replace(/"/g, "&quot;").replace(/</g, "&lt;"); }

loadRecipes();
</script>
</body>
</html>
